<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simon Says Game</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="game-container">
        <h1>🎮 Simon Says Game</h1>
        <h2 id="level-title">Press anywhere to start</h2>
        <p class="info">Repeat the pattern correctly to level up!</p>

        <div class="btn-container">
            <div class="line-one">
                <button class="btn red" id="red"></button>
                <button class="btn yellow" id="yellow"></button>
            </div>
            <div class="line-two">
                <button class="btn grey" id="grey"></button>
                <button class="btn purple" id="purple"></button>
            </div>
        </div>
    </div>

    <script src="app.js"></script>

</body>
</html>
